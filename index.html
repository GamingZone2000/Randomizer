<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arpoja</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    body { background-color: rgb(21, 124, 175); font-family: 'Poppins', sans-serif; }
    button:hover { transform: scale(1.05); }
    .kortti {
      background-color: white; max-width: 400px; margin: 40px auto;
      padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    #pyora { transition: transform 4s cubic-bezier(0.2, 0.8, 0.2, 1); }
    #osoitin {
      position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0; border-left: 15px solid transparent;
      border-right: 15px solid transparent; border-top: 28px solid #333; z-index: 2;
    }
  </style>
  <script data-goatcounter="https://samupahajoki.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>

  <button onclick="toggleHistoria()" id="historiaNappi" style="position: fixed; top: 10px; left: 10px; padding: 10px 16px; border: none; border-radius: 8px; background-color: white; cursor: pointer; font-family: 'Poppins', sans-serif; font-weight: bold;">📜 Historia</button>
  <div id="historiaPaneeli" style="position: fixed; top: 55px; left: 10px; display: none; background-color: white; padding: 15px; border-radius: 10px; max-width: 250px; max-height: 400px; overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.2);"></div>

  <button onclick="toggleKieli()" id="kieliNappi" style="position: fixed; top: 10px; right: 10px; padding: 10px 16px; border: none; border-radius: 8px; background-color: white; cursor: pointer; font-family: 'Poppins', sans-serif; font-weight: bold;">EN</button>
  <button onclick="toggleAani()" id="aaniNappi" style="position: fixed; top: 55px; right: 10px; padding: 10px 16px; border: none; border-radius: 8px; background-color: white; cursor: pointer; font-family: 'Poppins', sans-serif; font-weight: bold;">🔊 Ääni: päällä</button>

  <h1 id="otsikko" style="text-align: center; font-size: 80px;">🎲 Arpoja</h1>
  <p id="ohjeTeksti" style="text-align: center;">Muista pitää vaihtoehdot pilkuilla erotettuina</p>

  <div id="listatAlue" style="text-align: center;"></div>

  <div class="kortti" style="text-align: center;">
    <input id="vaihtoehdot" onkeydown="if (event.key === 'Enter') arvo()" oninput="localStorage.setItem('vaihtoehdot', this.value); piirraPyora()" style="width: 300px;" placeholder="Mitä haluat arpoa?">
    <br><br>
    <div style="position: relative; width: 300px; height: 300px; margin: 0 auto;">
      <div id="osoitin"></div>
      <canvas id="pyora" width="300" height="300"></canvas>
    </div>
    <br>
    <button onclick="arvo()" id="arvoNappi" style="font-size: 24px; padding: 12px 30px; background-color: #4CAF50; color: white; border: none; border-radius: 10px; cursor: pointer;">Arvo!</button>
    <p id="tulos" style="font-size: 32px; font-weight: bold; color: #4CAF50;"></p>
    <button onclick="tallennaLista()" id="tallennaNappi" style="padding: 8px 14px; border: none; border-radius: 8px; background-color: #eee; cursor: pointer; font-family: 'Poppins', sans-serif;">💾 Tallenna lista</button>
  </div>

  <script>
    var historiaLista = [];
    var pyorii = false;
    var nykyinenKulma = 0;
    var aaniPaalla = true;
    var listat = {};
    var kieli = "en";
    var viimeinenVoittaja = null;

    var kaannokset = {
      fi: {
        otsikko: "🎲 Arpoja",
        ohje: "Muista pitää vaihtoehdot pilkuilla erotettuina",
        placeholder: "Mitä haluat arpoa?",
        arvo: "Arvo!",
        valittu: "valittu: ",
        tallenna: "💾 Tallenna lista",
        historia: "📜 Historia",
        tyhjenna: "🗑️ Tyhjennä",
        aaniPaalla: "🔊 Ääni: päällä",
        aaniPois: "🔇 Ääni: pois",
        nimiKysymys: "Anna listalle nimi:",
        kirjoitaEnsin: "Kirjoita ensin vaihtoehtoja!"
      },
      en: {
        otsikko: "🎲Randomizer",
        ohje: "Remember to separate options with commas",
        placeholder: "What do you want to pick?",
        arvo: "Spin!",
        valittu: "selected: ",
        tallenna: "💾 Save list",
        historia: "📜 History",
        tyhjenna: "🗑️ Clear",
        aaniPaalla: "🔊 Sound: on",
        aaniPois: "🔇 Sound: off",
        nimiKysymys: "Enter a name for the list:",
        kirjoitaEnsin: "Type some options first!"
      }
    };

    function piirraPyora() {
      var teksti = document.getElementById("vaihtoehdot").value;
      var raaka = teksti.split(",");
      var lista = [];
           for (var i = 0; i < raaka.length; i++) {
        var vaihtoehto = raaka[i].trim();
        if (vaihtoehto !== "" && lista.indexOf(vaihtoehto) === -1) {
          lista.push(vaihtoehto);
        }
      }
      
      var ctx = document.getElementById("pyora").getContext("2d");
      ctx.clearRect(0, 0, 300, 300);
      if (lista.length === 0) return [];

      var varit = ["#e74c3c", "#3498db", "#2ecc71", "#f1c40f", "#9b59b6", "#e67e22", "#1abc9c", "#34495e"];
      var pala = (2 * Math.PI) / lista.length;
      for (var i = 0; i < lista.length; i++) {
        ctx.beginPath();
        ctx.moveTo(150, 150);
        ctx.arc(150, 150, 150, i * pala, (i + 1) * pala);
        ctx.fillStyle = varit[i % varit.length];
        ctx.fill();
        ctx.save();
        ctx.translate(150, 150);
        ctx.rotate(i * pala + pala / 2);
        ctx.fillStyle = "white";
        ctx.font = "bold 15px sans-serif";
        ctx.textAlign = "right";
        ctx.fillText(lista[i], 135, 5);
        ctx.restore();
      }
      return lista;
    }

    function arvo() {
      if (pyorii) return;
      var lista = piirraPyora();
      if (lista.length === 0) {
        document.getElementById("tulos").textContent = kaannokset[kieli].kirjoitaEnsin;
        return;
      }
      var teksti = document.getElementById("vaihtoehdot").value;
      localStorage.setItem("vaihtoehdot", teksti);
      pyorii = true;

      var voittajaIndex = Math.floor(Math.random() * lista.length);
      var palaAste = 360 / lista.length;
      var keskiKulma = voittajaIndex * palaAste + palaAste / 2;
      var maali = ((270 - keskiKulma) % 360 + 360) % 360;
      var nyt = ((nykyinenKulma % 360) + 360) % 360;
      var lisays = ((maali - nyt) % 360 + 360) % 360 + 360 * 5;
      nykyinenKulma += lisays;
      document.getElementById("pyora").style.transform = "rotate(" + nykyinenKulma + "deg)";

      setTimeout(function () {
        var voittaja = lista[voittajaIndex];
        viimeinenVoittaja = voittaja;
        document.getElementById("tulos").textContent = kaannokset[kieli].valittu + voittaja;
        historiaLista.unshift({ voittaja: voittaja, vaihtoehdot: teksti });
        naytaHistoria();
        confetti();
        soitaAani();
        localStorage.setItem("historia", JSON.stringify(historiaLista));
        pyorii = false;
      }, 4100);
    }

    function soitaAani() {
      if (!aaniPaalla) return;
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = "triangle";
      osc.frequency.value = 880;
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.3);
      osc.stop(ctx.currentTime + 0.3);
    }

    function naytaHistoria() {
      var paneeli = document.getElementById("historiaPaneeli");
      var html = "<button onclick='tyhjennaHistoria()'>" + kaannokset[kieli].tyhjenna + "</button><br><br>";
      for (var i = 0; i < historiaLista.length; i++) {
        html += "<b>" + historiaLista[i].voittaja + "</b><br>";
        html += "<small style='color:#888'>" + historiaLista[i].vaihtoehdot + "</small><br><br>";
      }
      paneeli.innerHTML = html;
    }

    function toggleHistoria() {
      var paneeli = document.getElementById("historiaPaneeli");
      if (paneeli.style.display === "none") {
        paneeli.style.display = "block";
      } else {
        paneeli.style.display = "none";
      }
    }

    function tyhjennaHistoria() {
      historiaLista = [];
      localStorage.removeItem("historia");
      naytaHistoria();
    }

    function toggleAani() {
      aaniPaalla = !aaniPaalla;
      if (aaniPaalla) {
        document.getElementById("aaniNappi").textContent = kaannokset[kieli].aaniPaalla;
      } else {
        document.getElementById("aaniNappi").textContent = kaannokset[kieli].aaniPois;
      }
    }

    function tallennaLista() {
      var nimi = prompt(kaannokset[kieli].nimiKysymys);
      if (nimi) {
        listat[nimi] = document.getElementById("vaihtoehdot").value;
        localStorage.setItem("listat", JSON.stringify(listat));
        naytaListat();
      }
    }

    function naytaListat() {
      var alue = document.getElementById("listatAlue");
      var html = "";
      for (var nimi in listat) {
        html += "<button onclick=\"lataaLista('" + nimi + "')\" style='margin:5px; padding:8px 14px; border:none; border-radius:8px; background:white; cursor:pointer; font-family:Poppins;'>" + nimi + "</button>";
    html += "<button onclick=\"poistaLista('" + nimi + "')\" style='margin-right:5px; padding:8px 10px; border:none; border-radius:8px; background:#e74c3c; color:white; cursor:pointer;'>✕</button>";
      }
      alue.innerHTML = html;
    }

    function lataaLista(nimi) {
      document.getElementById("vaihtoehdot").value = listat[nimi];
      localStorage.setItem("vaihtoehdot", listat[nimi]);
      piirraPyora();
    }

    function toggleKieli() {
      kieli = (kieli === "fi") ? "en" : "fi";
      localStorage.setItem("kieli", kieli);
      paivitaKieli();
    }
  function poistaLista(nimi) {
      delete listat[nimi];
      localStorage.setItem("listat", JSON.stringify(listat));
      naytaListat();
  }
    function paivitaKieli() {
        
      var k = kaannokset[kieli];
      document.getElementById("ohjeTeksti").textContent = k.ohje;
      document.getElementById("otsikko").textContent = k.otsikko
      document.getElementById("vaihtoehdot").placeholder = k.placeholder;
      document.getElementById("arvoNappi").textContent = k.arvo;
      document.getElementById("tallennaNappi").textContent = k.tallenna;
      document.getElementById("historiaNappi").textContent = k.historia;
      document.getElementById("aaniNappi").textContent = aaniPaalla ? k.aaniPaalla : k.aaniPois;
      document.getElementById("kieliNappi").textContent = (kieli === "fi") ? "EN" : "FI";
      if (viimeinenVoittaja) {
     document.getElementById("tulos").textContent = kaannokset[kieli].valittu + viimeinenVoittaja;


      }
      naytaHistoria();
    }

    window.onload = function () {
      var tallennettu = localStorage.getItem("vaihtoehdot");
      if (tallennettu) {
        document.getElementById("vaihtoehdot").value = tallennettu;
      }
      var tallennettuHistoria = localStorage.getItem("historia");
      if (tallennettuHistoria) {
        historiaLista = JSON.parse(tallennettuHistoria);
        naytaHistoria();
      }
      var tallennetutListat = localStorage.getItem("listat");
      if (tallennetutListat) {
        listat = JSON.parse(tallennetutListat);
      }
      naytaListat();
      var tallennettuKieli = localStorage.getItem("kieli");
      if (tallennettuKieli) {
        kieli = tallennettuKieli;
      }
      paivitaKieli();
      piirraPyora();
    }
  </script>

</body>
</html>
